id: r001
slug: persephone-inanna
story_a: persephone-descent
story_b: inanna-descent
resonance_type: contrast
resonance_description: >
  Both are stories of a queen descending to the underworld. Both involve
  a stripping away — Persephone loses her maiden world, Inanna loses her
  garments of power. Both spend time in the realm of the dead. Both return,
  changed, on conditions. Both stories explain cycles — seasonal in
  Persephone's case, the alternation of death and life in Inanna's.
  Both have become foundational texts for understanding feminine initiation.
key_divergence: >
  Inanna CHOOSES to descend. She hears something calling from the Great Below
  and she goes, eyes open, leaving instructions for her rescue. Persephone is
  TAKEN — seized, carried away screaming. This is the crucial difference. One
  is a story about the courage to go willingly into the dark. The other is a
  story about what happens when the dark comes for you uninvited. Both are
  true. Both happen. The question for the listener is: which one are you
  living right now? Are you choosing this descent, or has it been thrust
  upon you? The answer changes what the story has to teach you.
teaching_note: >
  Always present these together when the Descent archetype is active.
  Name the resonance first — "both queens go to the underworld" — then
  name the divergence clearly: "But notice: Inanna chooses. Persephone
  is taken. That difference may matter for you." Let the listener
  identify which version speaks to their situation. Do not resolve it.
