id: r002
slug: odysseus-oisin
story_a: odysseus-return
story_b: oisin-tir-na-nog
resonance_type: contrast
resonance_description: >
  Both are warriors who leave for another world and return after many years
  to find everything changed. Both face the question: who am I now, in this
  place that was once home? Both returns involve a test — Odysseus must prove
  he is who he claims to be; Oisín must not touch the ground.
key_divergence: >
  Odysseus returns and RECLAIMS. He kills the suitors, re-establishes his
  authority, and rebuilds his life. The return is violent but successful —
  he gets his home back. Oisín returns and LOSES EVERYTHING. The moment he
  touches the ground, time destroys him. He cannot reclaim the old world
  because it no longer exists. One is a story about the return that works.
  The other is a story about the return that cannot. The question is:
  which return are you facing? Can you go back, or is the world you left
  already gone?
teaching_note: >
  These are devastating when paired. Especially for anyone who has been
  away — from a country, a career, a relationship, a version of themselves.
  Odysseus says: you can go back, but you'll have to fight for it.
  Oisín says: you cannot go back, but you can still tell the story.
