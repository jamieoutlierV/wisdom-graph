sensitivity_notes: >
  This myth was central to the Eleusinian Mysteries, which were secret initiatory
  rites. The Mysteries themselves are Ring 1 (archaeological — no living custodians).
  The myth is fully public domain and widely known. However, be aware that for some
  modern Hellenic polytheist practitioners, this is living religious material.
