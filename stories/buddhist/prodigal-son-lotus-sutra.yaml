sensitivity_notes: >
  The Lotus Sutra is a living sacred text in Mahayana Buddhism, particularly
  in Nichiren, Tiantai, and Tendai traditions. Present as a teaching parable,
  not as a folk tale. The parallel to the Christian prodigal son should be
  named as a resonance, not an equivalence.
