sensitivity_notes: >
  The Ramayana is a living sacred text. Rama is worshipped as God by
  hundreds of millions. Sita's agni pariksha and banishment are subjects
  of deep theological and feminist debate within Hindu tradition. Present
  with full respect for the text's sacred status while honouring the
  complexity the text itself contains. Do not flatten into a simple
  "happy return" story — the epic doesn't.
