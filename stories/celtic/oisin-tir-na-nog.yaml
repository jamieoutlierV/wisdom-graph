summary: >
  Oisín, warrior-poet of the Fianna, falls in love with Niamh of the Golden
  Hair, who takes him across the sea to Tír na nÓg — the Land of the Young.
  He lives there in beauty and timelessness. After what feels like three years,
  he yearns for Ireland and the Fianna. Niamh gives him a white horse and
  warns him: do not let your feet touch the ground. He rides back to Ireland
  and finds three hundred years have passed. The Fianna are gone. The old
  world is gone. He reaches down to help some men lift a stone, slips from
  the saddle, and the moment his foot touches Irish soil, all three hundred
  years rush into his body. He becomes an ancient, blind old man. Saint Patrick
  finds him and tries to convert him. Oisín tells him stories of the Fianna
  instead.

full_text: >
  Niamh came from the west, riding a white horse across the surface of the
  sea. Her hair was gold. Her eyes held distances. She said to Oisín:

  "Come with me to Tír na nÓg, the Land of the Young, where there is no
  death, no age, no sorrow. The trees bear fruit and blossom at the same
  time. The rivers run with honey. You will never grow old."

  And Oisín, who had seen his friends die in battle, who had felt the weight
  of years, who loved beauty as only a poet can — Oisín mounted the white
  horse and rode with her across the sea.

  In Tír na nÓg, he was happy. The days were golden. He fought no battles
  but those that ended in feasting. He loved Niamh. Three years passed —
  or what felt like three years.

  But the ache came. The ache for Ireland, for the green hills, for the
  voices of the Fianna, for the sound of his own language spoken by mortal
  tongues. He asked Niamh to let him return.

  She wept. She gave him the white horse and said: "Do not dismount.
  Do not let your feet touch the soil of Ireland. If you do, you can
  never return to me."

  He rode back across the sea. Ireland was changed. The hills were smaller
  somehow. There were no Fianna. The people he met had never heard of Fionn
  mac Cumhaill. Three hundred years had passed.

  He came upon men struggling to lift a great stone. He leaned from the
  saddle to help them. The girth broke. He fell. His feet touched the ground.

  And three hundred years entered him like a wave. His hair went white.
  His back bent. His eyes dimmed. The white horse vanished across the sea,
  back to Tír na nÓg, back to Niamh, who stood on the shore waiting
  for someone who would not return.

  Saint Patrick found him — a blind, ancient man, the last of the Fianna.
  Patrick spoke to him of God and heaven. Oisín said: "If your God is
  so great, would he let Fionn into his heaven? For if the Fianna are not
  there, I will not go."

  And he sat in the rain and told stories of the old world to anyone
  who would listen.

telling_notes: >
  This is the most devastating Return in world mythology. The return
  destroys the returner. Oisín cannot go back AND stay who he is —
  the choice is permanent exile in paradise or aging to death in the
  world he loves. And the world he loves is gone. For anyone navigating
  a return — from abroad, from a career change, from a relationship,
  from a period of being lost — this story says: you will not find what
  you left. But it also says: the stories survive. Oisín blind and
  ancient is still telling stories. That is the gift.

