summary: >
  Eshu — also called Elegba, Legba, Exú — is the Orisha of the crossroads,
  the divine messenger, the opener of doors. In one widely shared story,
  Eshu walks between two friends wearing a hat that is red on one side and
  black on the other. Each friend sees only one colour. They argue about
  what they saw. Their friendship breaks. Eshu reveals the two-sided hat.
  The lesson: perspective is partial. What you see depends on where you stand.
  Eshu does not cause the conflict — he reveals the conflict that was
  already there in the assumption that your view is the only view.

full_text: >
  Two friends farmed on opposite sides of a road. They had been friends
  since childhood, and each man swore that nothing could come between them.

  Eshu heard this, and he smiled. Not cruelly — but as one smiles who
  knows what humans do not yet know about themselves.

  He made himself a hat. One side was red. The other side was black.
  He walked down the road between the two farms at noon, when both
  friends were working.

  That evening, one friend said: "Did you see that man in the red hat?"
  The other said: "It was a black hat."
  "Red."
  "Black."
  "I saw it with my own eyes."
  "And I saw it with mine."

  Their friendship broke. Each man was certain. Each man was right.
  Each man could see only one side.

  Eshu returned and showed them the hat. Red on one side. Black on
  the other.

  "You are both right," he said. "And you are both wrong. You could
  not see what was not on your side. Spreading strife is my greatest
  delight."

  But this is not cruelty. This is the teaching. Eshu stands at
  every crossroads — every place where a choice must be made, where
  a path divides, where you must decide what you have seen and what
  it means. He is the reminder that your perspective is always partial.
  That the door opens both ways. That the message changes depending
  on who receives it.

  Nothing begins without Eshu. No ritual, no divination, no offering
  to any Orisha is made without first honouring Eshu. Because if
  you do not acknowledge the one who stands at the door, the door
  will not open.

telling_notes: >
  Eshu is NOT a devil figure — a colonial misreading that has caused
  enormous harm. He is the divine communicator, the principle of
  dynamic exchange, the crossroads itself. Present with deep respect.
  The "spreading strife" line is often misunderstood — Eshu reveals
  strife that already exists in human certainty. He does not CREATE
  conflict; he shows you the conflict your assumptions have been hiding.
  Ask the listener: what are you certain of that might look different
  from the other side?

