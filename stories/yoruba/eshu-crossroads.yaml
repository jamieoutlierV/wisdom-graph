sensitivity_notes: >
  Eshu/Elegba is a living deity in Yoruba, Candomblé, Santería, and related
  traditions. This particular story (the two-sided hat) is widely shared
  and appears in numerous published sources. However, deeper Ifá material
  about Eshu is restricted to initiated practitioners. Stay with publicly
  shared stories only. NEVER present Eshu as evil, demonic, or as a
  Satan analogue — this is a colonial distortion.
