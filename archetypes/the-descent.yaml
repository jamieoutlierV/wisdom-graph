id: a001
name: The Descent
slug: the-descent
jungian_parallel: "Nekyia — the night sea journey. Confrontation with the unconscious."
description: >
  The archetype of going down — into the underworld, the belly of the whale, the dark
  forest, the depths of the sea. Something must be surrendered or lost in the descent:
  sight, status, certainty, the old self. What is found below cannot be carried back
  unchanged. The descent is not failure — it is the necessary passage through which
  transformation occurs. Every tradition has a version. They disagree on whether the
  descent is chosen or forced, and that disagreement is itself instructive.
emotional_registers:
  - grief
  - despair
  - confusion
  - emptiness
  - surrender
  - threshold
life_stages:
  - midlife_descent
  - dark_night
  - initiation
key_questions:
  - "Is this a descent you chose, or one that was thrust upon you?"
  - "What did you have to leave at the surface before you could go down?"
  - "What have you found in the dark that you couldn't have found in the light?"
  - "Who are you becoming in the deep?"
shadow_expression: >
  Avoidance of the descent — staying on the surface, numbing, busy-ness, spiritual
  bypassing. Or getting stuck in the underworld — depression without transformation,
  descent without return, romanticising darkness.
gift: >
  Knowledge that can only be gained in the dark. The capacity to hold paradox.
  Compassion born from having been broken. Eyes that see in low light.
stories:
  - persephone-descent
  - inanna-descent
  - odin-well-of-mimir
  - jonah-belly-of-whale
