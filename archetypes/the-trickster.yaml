id: a002
name: The Trickster
slug: the-trickster
jungian_parallel: "The Shadow as creative agent. Mercurius in alchemy."
description: >
  The figure who breaks rules, crosses boundaries, steals from the gods, and
  opens doors that were meant to stay shut. The Trickster is amoral rather than
  immoral — operating outside the categories of good and evil to reveal their
  arbitrariness. Every tradition has a Trickster, and each reveals something
  different about what boundaries that culture considers sacred. The Trickster
  is dangerous and necessary. Without the Trickster, systems calcify.
  With the Trickster unchecked, systems collapse.
emotional_registers:
  - stuckness
  - confusion
  - disillusionment
  - yearning
  - rage
life_stages:
  - youth_calling
  - first_threshold
  - midlife_descent
key_questions:
  - "What would the Trickster do in your situation that you haven't dared to consider?"
  - "Which rules are you following that no longer serve you?"
  - "What if the disruption IS the gift?"
  - "Who benefits from the boundary you're afraid to cross?"
shadow_expression: >
  Chaos without purpose. Disruption as avoidance. The con artist, the manipulator,
  the person who breaks things but never builds. Irony as armour against sincerity.
gift: >
  Freedom from rigid categories. The ability to see the game for what it is.
  Creative solutions that only appear when the rules are suspended.
  Laughter in the face of the sacred — which is itself sacred.
stories:
  - hermes-steals-cattle
  - loki-shapeshifter
  - eshu-crossroads
  - zhuangzi-useless-tree
