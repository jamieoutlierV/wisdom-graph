bioregion: "Tidal river estuary, Thames basin"
landscape_character: >
  A threshold place. The Thames is tidal — the sea reaches into the city twice
  a day. This has made London a crossing point, a trading point, a place where
  things and people from different worlds meet and exchange. The river is dark —
  the Celts named it for its colour. It is a boundary: north bank, south bank.
  The bridges are acts of connection across a natural divide. This is a place
  where commerce, migration, and the mingling of cultures have shaped every layer
  of settlement for two thousand years.
