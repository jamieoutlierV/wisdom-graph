  - celtic
  - roman
  - anglo-saxon
  - norse
  - jewish
  - islamic
  - hindu
  - yoruba
spatial_ontologies:
  - tradition: celtic
    ontology_type: "sacred river / threshold place"
    permission_ring: archaeological
    description: "The Thames as a sacred boundary — votive offerings found throughout the riverbed. The Battersea Shield, the Waterloo Helmet. The river was a place you gave things to."
  - tradition: roman
    ontology_type: "augury / templum"
    permission_ring: archaeological
    description: "Roman augurs would have read this landscape — the hills (Ludgate, Cornhill), the river, the marshes of Southwark. The Temple of Mithras in the financial district."
  - tradition: anglo-saxon
    ontology_type: "trading place / wic"
    permission_ring: archaeological
    description: "Lundenwic — the place where trade happens. The Strand as the beach where boats landed. Commerce as the sacred act of this particular place."
permission_level: archaeological
custodian_notes: >
  London's deep-time identity is as a crossing place and trading place.
  Multiple traditions have roots here through migration and diaspora — this
  is one of the most culturally layered places on earth. The Thames itself
  is the constant. Present the river first, then the layers of settlement.
